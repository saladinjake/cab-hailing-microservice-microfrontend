version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2281:2181"

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - zookeeper
    ports:
      - "9192:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9192
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-postgis:
    image: postgis/postgis:13-3.1
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ride_db
    ports:
      - "5431:5432"

  mongodb:
    image: mongo:5.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27117:27017"

  redis:
    image: redis:6.2-alpine
    ports:
      - "6371:6379"

  user-service:
    build: ./backend/user-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: mongodb://user:password@mongodb:27017/user_db?authSource=admin
    depends_on:
      - mongodb

  ride-service:
    build: ./backend/ride-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      DB_HOST: postgres-postgis
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: ride_db
      KAFKA_BROKER: kafka:29092
    depends_on:
      - postgres-postgis
      - kafka

  notification-service:
    build: ./backend/notification-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      KAFKA_BROKER: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      - kafka
      - redis

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "5201:5201"
    environment:
      PORT: 5201
      USER_SERVICE_URL: http://user-service:5001
      RIDE_SERVICE_URL: http://ride-service:5002
      NOTIFICATION_SERVICE_URL: http://notification-service:5003
    depends_on:
      - user-service
      - ride-service
      - notification-service
